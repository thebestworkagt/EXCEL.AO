name: Deploy to Nekoweb

on:
  push:
    branches:
      - main
      - master  # Funciona automaticamente em qualquer uma das duas

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Enviar arquivos para o Nekoweb
        run: |
          # 1. Limpa o site antigo para receber os novos arquivos
          curl -X POST https://nekoweb.org/api/site/clear \
            -H "Authorization: ${{ secrets.NEKOWEB_API_TOKEN }}"

          # 2. Envia o arquivo principal obrigatoriamente
          if [ -f index.html ]; then
            curl -X POST https://nekoweb.org/api/site/upload \
              -H "Authorization: ${{ secrets.NEKOWEB_API_TOKEN }}" \
              -F "pathname=index.html" \
              -F "file=@index.html"
          fi

          # 3. Envia todos os outros arquivos visíveis do repositório
          find . -maxdepth 3 -type f ! -path '*/.*' | while read -r file; do
            # Remove o './' do início do caminho
            clean_path=$(echo "$file" | sed 's|^\./||')
            
            # Evita reenviar o index.html que já foi enviado acima
            if [ "$clean_path" != "index.html" ]; then
              curl -X POST https://nekoweb.org/api/site/upload \
                -H "Authorization: ${{ secrets.NEKOWEB_API_TOKEN }}" \
                -F "pathname=$clean_path" \
                -F "file=@$file"
            fi
          done
